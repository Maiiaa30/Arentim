<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0907" />

    <!-- PWA: installable + push-capable. Icon/manifest live in /public. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Arentim" />

    <meta
      name="description"
      content="Arentim — a play-money social casino and football sportsbook. No real money involved."
    />

    <!--
      Content-Security-Policy. The authoritative CSP is set as a real HTTP header
      at the host/CDN (see docs/SECURITY.md and vercel.json). This meta tag is a
      defence-in-depth fallback for environments that serve static files directly.
      'unsafe-inline' for styles is required by Tailwind's injected styles; scripts
      stay locked to 'self'. connect-src is widened to Supabase at build time.
      Note: frame-ancestors is intentionally omitted here — it's ignored in a
      <meta> CSP (browser warning) and is enforced via the real HTTP header at
      the host/CDN (vercel.json) instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'; object-src 'none'"
    />

    <!-- Fonts: preconnect + a single stylesheet link so they fetch early and in
         parallel (faster than an @import inside the CSS, which is render-blocking). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    />

    <title>Arentim</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
