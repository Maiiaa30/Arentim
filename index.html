<!doctype html>
<html lang="pt-PT" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0907" />
    <meta name="application-name" content="Arentim" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta
      name="description"
      content="Arentim — casa de jogos social a dinheiro de mentira: casino, apostas de futebol e jogos com amigos. Sem dinheiro real."
    />

    <!-- Social sharing (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Arentim" />
    <meta property="og:title" content="Arentim — Casa de Jogos" />
    <meta property="og:description" content="Casino social, apostas de futebol e jogos com amigos. Só a brincar — sem dinheiro real." />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:locale" content="pt_PT" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Arentim — Casa de Jogos" />
    <meta name="twitter:description" content="Casino social, apostas de futebol e jogos com amigos. Só a brincar — sem dinheiro real." />
    <meta name="twitter:image" content="/favicon.svg" />

    <!--
      Content-Security-Policy. The authoritative CSP is set as a real HTTP header
      at the host/CDN (see docs/SECURITY.md and vercel.json). This meta tag is a
      defence-in-depth fallback for environments that serve static files directly.
      'unsafe-inline' for styles is required by Tailwind's injected styles; scripts
      stay locked to 'self'. connect-src is widened to Supabase at build time.
      Note: frame-ancestors is intentionally omitted here — it's ignored in a
      <meta> CSP (browser warning) and is enforced via the real HTTP header at
      the host/CDN (vercel.json) instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'; object-src 'none'"
    />

    <!-- Fonts: preconnect + a single stylesheet link so they fetch early and in
         parallel (faster than an @import inside the CSS, which is render-blocking). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    />

    <title>Arentim — Casa de Jogos</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
