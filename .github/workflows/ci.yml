name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No production secrets in CI. Tests run against mocks / a disposable test DB,
# never the live Supabase project or real API keys.
permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, audit, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build
      - run: npm run test:e2e
