name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No production secrets in CI. Tests run against mocks / a disposable test DB,
# never the live Supabase project or real API keys.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a new push doesn't queue behind an
# obsolete one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, audit, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build
      - run: npm run check:secrets

  # Runs in parallel with `verify` (no `needs:`) and caches the browser so it is
  # not re-downloaded each run. Only Chromium is installed (the only project).
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Chromium (cached)
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
