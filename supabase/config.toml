# Supabase project config — checked into version control so the security posture
# is reviewable and reproducible instead of living only in Dashboard state.
#
# This repo manages a REMOTE project (migrations applied via `npm run db:migrate`).
# The [functions.*] verify_jwt = true blocks below codify the posture documented
# in docs/EDGE_FUNCTIONS.md ("deployed with JWT verification on") — committing
# them changes nothing live, it just versions what is already true and makes
# future `supabase functions deploy` reproducible.
#
# The [auth] / [api] hardening below is COMMENTED OUT on purpose: pushing values
# that don't match the live Dashboard could silently change signup / email
# confirmation / token lifetimes. Review each against the Dashboard, then
# uncomment and `supabase config push` deliberately.

project_id = "kactlxdjoxjrqhmkjtfj"

# --- Edge Functions: require a valid JWT at the gateway for every function. ----
# User-facing functions then also call auth.getUser(); the cron functions pass
# the anon key (a valid JWT) + their own x-sync-secret as the real guard.
[functions.poker-table]
verify_jwt = true

[functions.poker-bots]
verify_jwt = true

[functions.sueca-table]
verify_jwt = true

[functions.battleship-table]
verify_jwt = true

[functions.send-invite]
verify_jwt = true

[functions.match-stats]
verify_jwt = true

[functions.generate-content]
verify_jwt = true

[functions.sync-fixtures]
verify_jwt = true

[functions.poll-live-scores]
verify_jwt = true

# --- Hardening ----------------------------------------------------------------
# These are SAFE to apply (they only tighten, never loosen, and don't change
# signup UX or invalidate existing sessions). Apply with `supabase config push`,
# or mirror them in the Dashboard. Verify against the Dashboard first if unsure.

[api]
# Bound PostgREST result sets so a forgotten .limit() can't pull huge pages.
max_rows = 1000

[auth]
# Short-lived access tokens (1h); the refresh token keeps users signed in.
jwt_expiry = 3600
# Reject reused refresh tokens (replay protection).
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Enforce a reasonable minimum password length on NEW passwords.
minimum_password_length = 8
# Require a mix of character classes on NEW passwords (raises the floor; note
# this alone does NOT block known-breached passwords like "Password123" — that
# needs the Dashboard HIBP toggle below). Valid values: "", "letters_digits",
# "lower_upper_letters_digits", "lower_upper_letters_digits_symbols".
password_requirements = "lower_upper_letters_digits"

[auth.email]
# OTP / magic-link links expire in <= 1h, not the 24h default.
otp_expiry = 3600

[auth.rate_limit]
# Cap auth abuse (brute force, email/OTP flooding, token churn).
email_sent = 10
sign_in_sign_ups = 30
token_refresh = 150

# --- UX-affecting choices — decide deliberately, then uncomment. --------------
# [auth]
# enable_signup = true              # turn OFF to stop open registration
# enable_confirmations = true       # require email confirmation before a session
#
# NOTE: the single biggest account-security toggle — "Leaked password protection"
# (checks new passwords against HaveIBeenPwned) — is Dashboard-only:
#   Authentication → Policies → "Prevent use of leaked passwords". Turn it ON.
# Consider enabling MFA (TOTP) there too when you're ready.
